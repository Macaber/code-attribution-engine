version: '3.8'

services:
  # --- Code Attribution Engine ---
  app:
    build: .
    container_name: code-attribution-engine
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-attribution123}
      - MYSQL_DATABASE=code_attribution
    depends_on:
      redis:
        condition: service_started
      mysql:
        condition: service_healthy
    restart: unless-stopped

  # --- Redis Queue Store ---
  redis:
    image: redis:7-alpine
    container_name: code-attribution-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    # If your Redis needs a password, you can enable it here:
    # command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-123456}"]
    restart: unless-stopped

  # --- MySQL Persistence ---
  mysql:
    image: mysql:8.0
    container_name: code-attribution-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-attribution123}
      MYSQL_DATABASE: code_attribution
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/core/database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  redis_data:
  mysql_data:
